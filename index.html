<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPC Birthday Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f0ede8;
  min-height: 100vh;
  padding: 0;
}
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
input, select, textarea { font-family: 'DM Sans', sans-serif; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #c9a84c !important; }

/* ─── Layout ────────────────────────────────────── */
#page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 12px 48px;
}
#app {
  width: 100%;
  max-width: 700px;
}

/* ─── Header ────────────────────────────────────── */
.top {
  background: #0a1c12;
  border-radius: 16px 16px 0 0;
  padding: 1.2rem 1.4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: #e8c96a;
  line-height: 1.1;
}
.brand p {
  font-size: 12px;
  font-weight: 600;
  color: rgba(232,201,106,.45);
  margin-top: 3px;
}
.top-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.date-lbl { font-size: 11px; font-weight: 700; color: rgba(232,201,106,.4); }
@media(max-width:440px){ .date-lbl { display: none; } }
.bell-wrap { position: relative; }
.bell-btn {
  background: rgba(201,168,76,.18);
  border: 1.5px solid rgba(201,168,76,.45);
  color: #e8c96a;
  border-radius: 10px;
  padding: 8px 13px;
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 800;
  transition: background .15s;
}
.bell-btn:hover { background: rgba(201,168,76,.28); }
.bell-btn i { font-size: 18px; }
.bell-badge {
  position: absolute; top: -7px; right: -7px;
  background: #e05c4a; color: #fff;
  border-radius: 10px; font-size: 10px; font-weight: 800;
  min-width: 18px; height: 18px;
  display: none; align-items: center; justify-content: center; padding: 0 4px;
}

/* ─── Notification Panel ─────────────────────────── */
.notif-panel {
  background: #eef3ff;
  border-left: 1px solid #c0d0f0;
  border-right: 1px solid #c0d0f0;
  border-bottom: 2px solid #c0d0f0;
  padding: 1.1rem 1.4rem;
  display: none;
}
.notif-panel.open { display: block; }
.np-title {
  font-size: 15px; font-weight: 800; color: #1a1a1a;
  margin-bottom: .9rem;
  display: flex; align-items: center; justify-content: space-between;
}
.np-close {
  background: none; border: none; font-size: 13px; font-weight: 700;
  color: #6b7280; padding: 2px 6px;
}
.perm-box {
  background: #fff; border: 1.5px solid #c0d0f0; border-radius: 10px;
  padding: .85rem 1rem; display: flex; align-items: center; gap: 12px;
  margin-bottom: .85rem;
}
.perm-text { flex: 1; font-size: 13px; font-weight: 600; color: #6b7280; line-height: 1.5; }
.perm-text strong { color: #2460b8; font-weight: 800; font-size: 14px; display: block; margin-bottom: 2px; }
.perm-action {
  background: #2460b8; color: #fff; border: none; border-radius: 7px;
  padding: 7px 14px; font-size: 13px; font-weight: 800; flex-shrink: 0;
  white-space: nowrap; transition: background .15s;
}
.perm-action:hover { background: #1a4a8a; }
.perm-action.ok-state { background: #d4f0e0; color: #0a5a2a; cursor: default; }
.perm-action.denied-state { background: #fdecea; color: #a32d2d; cursor: not-allowed; }
.ni { display: flex; align-items: center; gap: 10px; padding: .55rem 0; border-bottom: 1px solid #dde8f8; }
.ni:last-child { border-bottom: none; }
.ni-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.d-gold { background: #c9a84c; } .d-green { background: #1a9d7a; } .d-gray { background: #bbb; }
.ni-name { font-size: 14px; font-weight: 700; color: #1a1a1a; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ni-sub { font-size: 12px; font-weight: 800; color: #6b7280; white-space: nowrap; }

/* ─── Navigation ─────────────────────────────────── */
.nav-bar {
  display: flex;
  background: #152e22;
  border-left: 1px solid rgba(0,0,0,.1);
  border-right: 1px solid rgba(0,0,0,.1);
  border-bottom: 2px solid rgba(201,168,76,.2);
  overflow-x: auto;
  padding: 0 .5rem;
  gap: 2px;
}
.nav-bar::-webkit-scrollbar { display: none; }
.nb {
  padding: .65rem .9rem;
  font-size: 13px; font-weight: 800;
  color: rgba(232,201,106,.45);
  border: none; background: none;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
  min-height: 46px; letter-spacing: .01em;
  transition: color .15s;
}
.nb svg { width: 15px; height: 15px; }
.nb.on { color: #e8c96a; border-bottom-color: #c9a84c; }
.nb:hover:not(.on) { color: rgba(232,201,106,.85); }

/* ─── Content Body ───────────────────────────────── */
.body {
  padding: 1.3rem;
  background: #fff;
  border: 1px solid rgba(0,0,0,.08);
  border-top: none;
  border-radius: 0 0 16px 16px;
}
.tab { display: none; }
.tab.on { display: block; }

/* ─── Stat Cards ─────────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 1.2rem;
}
@media(min-width: 480px) { .stats { grid-template-columns: repeat(4, 1fr); } }
.sc { border-radius: 12px; padding: 1rem .75rem; text-align: center; border: none; }
.sc-g { background: #0a1c12; color: #e8c96a; }
.sc-g .sl { color: rgba(232,201,106,.6); }
.sc-gold { background: #fdf3dc; border: 1.5px solid #c9a84c; }
.sc-gold .sn { color: #9a6e00; } .sc-gold .sl { color: #7a4a00; }
.sc-or { background: #fff3e8; border: 1.5px solid #e07c2a; }
.sc-or .sn { color: #a04a00; } .sc-or .sl { color: #8a3a00; }
.sc-teal { background: #e6f8f2; border: 1.5px solid #1a9d7a; }
.sc-teal .sn { color: #0a6a50; } .sc-teal .sl { color: #0a5a42; }
.sn { font-size: 30px; font-weight: 800; font-family: 'Playfair Display', serif; }
.sl { font-size: 11px; font-weight: 800; margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }

/* ─── Banners ────────────────────────────────────── */
.banner { border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 1.1rem; border: 1.5px solid transparent; }
.bn-gold { background: linear-gradient(135deg,#fffbf0,#fdf3dc); border-color: #d4a843; }
.bn-gold h3 { font-size: 16px; font-weight: 800; color: #6a3a00; font-family: 'Playfair Display', serif; }
.bn-gold p { font-size: 14px; font-weight: 600; color: #7a4a00; margin-top: 5px; line-height: 1.6; }
.bn-info { background: #f0f4ff; border-color: #c0d0f0; }
.bn-info p { font-size: 14px; font-weight: 600; color: #3a5080; }

/* ─── Section Headings ───────────────────────────── */
.sh { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; margin: 1rem 0 .6rem; display: flex; align-items: center; gap: 8px; }
.sh-label { color: #6b7280; }
.sh-chip { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 800; }
.chip-gold { background: #fdf3dc; color: #7a4a00; border: 1px solid #c9a84c; }
.chip-or { background: #fff3e8; color: #8a3a00; border: 1px solid #e07c2a; }
.chip-teal { background: #e6f8f2; color: #0a5a42; border: 1px solid #1a9d7a; }
.chip-blue { background: #eaf1fd; color: #0c3880; border: 1px solid #a0bce8; }
.chip-def { background: #f3f4f6; color: #6b7280; }

/* ─── Member Cards ───────────────────────────────── */
.mc { display: flex; align-items: flex-start; gap: 12px; border-radius: 12px; padding: .9rem 1rem; margin-bottom: 8px; border: 1.5px solid; transition: transform .12s; }
.mc:hover { transform: translateY(-1px); }
.mc-today { background: #fffbf0; border-color: #c9a84c; }
.mc-week { background: #fff8f2; border-color: #f0a060; }
.mc-soon { background: #f0fdf8; border-color: #80d0b8; }
.mc-def { background: #fff; border-color: #e5e7eb; }
.av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
.av0 { background: #1a6b3a; color: #fff; } .av1 { background: #1a4a8a; color: #fff; }
.av2 { background: #c9a84c; color: #412402; } .av3 { background: #c0452a; color: #fff; }
.av4 { background: #7c3aab; color: #fff; } .av5 { background: #1a7a6a; color: #fff; }
.mi { flex: 1; min-width: 0; }
.mn { font-size: 16px; font-weight: 800; color: #1a1a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ma { font-size: 13px; font-weight: 700; color: #6b7280; margin-top: 1px; }
.ph { font-size: 13px; font-weight: 600; color: #6b7280; display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.mm { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.bd { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
.b-loc { background: #eef2f8; color: #3a5080; }
.b-date { background: #f0f4f8; color: #4a6080; }
.b-today { background: #c9a84c; color: #412402; }
.b-week { background: #fff3e8; color: #8a3a00; border: 1px solid #e07c2a; }
.b-near { background: #e6f8f2; color: #0a5a42; border: 1px solid #1a9d7a; }
.b-state { background: #f5f0ff; color: #5a2a8a; }
.mc-r { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; min-width: 64px; }
.cdown { text-align: right; }
.cdn { font-size: 22px; font-weight: 800; font-family: 'Playfair Display', serif; line-height: 1; }
.cdn-gold { color: #9a6e00; } .cdn-or { color: #c06015; } .cdn-teal { color: #0a6a50; } .cdn-blue { color: #2460b8; }
.cdl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; }
.cdl-gold { color: #7a4a00; } .cdl-or { color: #8a3a00; } .cdl-teal { color: #0a5a42; } .cdl-blue { color: #0c3880; }
.ic-btn { font-size: 12px; font-weight: 800; background: #eaf1fd; color: #0c3880; border: 1.5px solid #a0bce8; border-radius: 7px; padding: 5px 10px; display: flex; align-items: center; gap: 4px; transition: all .15s; }
.ic-btn:hover { background: #2460b8; color: #fff; border-color: #2460b8; }
.del-x { font-size: 14px; color: #9ca3af; background: none; border: none; padding: 3px 5px; display: flex; align-items: center; font-weight: 800; }
.del-x:hover { color: #a32d2d; }

/* ─── Search & Filters ───────────────────────────── */
.sw { position: relative; margin-bottom: .9rem; }
.sw-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
.si { width: 100%; padding: .65rem .9rem .65rem 36px; font-size: 15px; font-weight: 600; border: 1.5px solid #d1d5db; border-radius: 10px; background: #f9fafb; color: #1a1a1a; transition: border-color .15s; }
.si:focus { border-color: #c9a84c; background: #fff; }
.frow { display: flex; gap: 8px; margin-bottom: .9rem; }
.frow select { flex: 1; font-size: 13px; font-weight: 700; border-radius: 8px; border: 1.5px solid #d1d5db; padding: .48rem .6rem; background: #f9fafb; color: #1a1a1a; transition: border-color .15s; }
.frow select:focus { border-color: #c9a84c; }
.res-count { font-size: 13px; font-weight: 800; color: #9ca3af; margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em; }

/* ─── Calendar ───────────────────────────────────── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }
.cal-nav select { font-size: 14px; font-weight: 700; border-radius: 8px; border: 1.5px solid #d1d5db; padding: .4rem .6rem; background: #f9fafb; }
.cal-cnt { font-size: 13px; font-weight: 800; background: #e6f8f2; color: #0a5a42; padding: 4px 12px; border-radius: 20px; border: 1px solid #1a9d7a; }
.cgrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: .8rem; }
.cdh { font-size: 11px; font-weight: 800; color: #9ca3af; text-align: center; padding: 5px 0; letter-spacing: .04em; }
.cday { min-height: 44px; border-radius: 8px; border: 1.5px solid #e5e7eb; padding: 4px 3px; display: flex; flex-direction: column; align-items: center; background: #fff; }
.cday.emp { background: none; border-color: transparent; }
.cday.hbd { background: #fdf3dc; border-color: #c9a84c; border-width: 2px; }
.cday.tdy { border-color: #0a1c12; border-width: 2.5px; background: #f0fff6; }
.cday.hbd.tdy { background: #fffbf0; border-color: #0a1c12; }
.cnum { font-size: 12px; font-weight: 700; color: #374151; }
.cday.hbd .cnum { color: #412402; font-weight: 800; }
.cnames { font-size: 7px; font-weight: 700; color: #7a4a00; text-align: center; margin-top: 1px; line-height: 1.3; word-break: break-all; }

/* ─── Form ───────────────────────────────────────── */
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:420px) { .fgrid { grid-template-columns: 1fr; } }
.full { grid-column: span 2; }
@media(max-width:420px) { .full { grid-column: span 1; } }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fl { font-size: 12px; font-weight: 800; color: #2460b8; text-transform: uppercase; letter-spacing: .05em; }
.fg input, .fg select, .fg textarea { font-size: 15px; font-weight: 600; width: 100%; border-radius: 9px; border: 1.5px solid #d1d5db; padding: .55rem .7rem; background: #f9fafb; color: #1a1a1a; transition: border-color .15s; }
.fg textarea { resize: vertical; min-height: 72px; }
.btn-go { background: #0a1c12; color: #e8c96a; border: none; padding: .72rem 1.5rem; border-radius: 10px; font-size: 15px; font-weight: 800; margin-top: .8rem; display: inline-flex; align-items: center; gap: 7px; min-height: 48px; transition: background .15s; }
.btn-go:hover { background: #152e22; }
.btn-sm { background: #f5f0ff; color: #7c3aab; border: 1.5px solid #c5a8e8; padding: .5rem 1rem; border-radius: 9px; font-size: 13px; font-weight: 800; margin-top: .6rem; min-height: 38px; transition: all .15s; }
.btn-sm:hover { background: #ede8fa; }

/* ─── Executive Cards ────────────────────────────── */
.ec { border-left: 5px solid #c9a84c; border-radius: 0 12px 12px 0; padding: 1rem 1.15rem; margin-bottom: 10px; border-top: 1.5px solid #e8e0c8; border-right: 1.5px solid #e8e0c8; border-bottom: 1.5px solid #e8e0c8; background: #fffdf5; }
.ec-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
.en { font-size: 15px; font-weight: 800; color: #1a1a1a; font-family: 'Playfair Display', serif; }
.et { font-size: 13px; font-weight: 700; color: #7a4a00; margin-top: 2px; }
.em { font-size: 14px; font-weight: 500; color: #374151; line-height: 1.75; font-style: italic; }
.edt { font-size: 11px; font-weight: 800; color: #7a4a00; margin-top: 7px; text-transform: uppercase; letter-spacing: .06em; }

/* ─── Feedback ───────────────────────────────────── */
.ok-msg { background: #d4f0e0; color: #0a5a2a; border-radius: 9px; padding: .6rem 1rem; font-size: 14px; font-weight: 700; margin-top: 10px; display: none; border: 1px solid #80c8a0; }
.err-msg { background: #fdecea; color: #a32d2d; border-radius: 9px; padding: .6rem 1rem; font-size: 14px; font-weight: 700; margin-top: 10px; display: none; border: 1px solid #f0a0a0; }
.empty-state { color: #9ca3af; font-size: 15px; font-weight: 600; padding: 1.5rem 0; text-align: center; }
.divider { height: 3px; background: linear-gradient(90deg, #fdf3dc, #e6f8f2, #eaf1fd); border-radius: 3px; margin: 1.2rem 0; }

/* ─── Phone icon ─────────────────────────────────── */
.icon-sm { width: 12px; height: 12px; vertical-align: -1px; }
</style>
</head>
<body>
<div id="page">
<div id="app">

  <!-- Header -->
  <div class="top">
    <div class="brand">
      <h1>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8c96a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:7px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>IPC Birthday Tracker
      </h1>
      <p id="hdr-sub">Loading members...</p>
    </div>
    <div class="top-right">
      <span class="date-lbl" id="hdr-date"></span>
      <div class="bell-wrap">
        <button class="bell-btn" onclick="togglePanel()" aria-label="Birthday notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="bell-lbl"></span>
        </button>
        <span class="bell-badge" id="bell-badge"></span>
      </div>
    </div>
  </div>

  <!-- Notification Panel -->
  <div class="notif-panel" id="notif-panel">
    <div class="np-title">
      <span>🔔 Birthday Notifications</span>
      <button class="np-close" onclick="togglePanel()">✕ Close</button>
    </div>
    <div class="perm-box">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2460b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      <div class="perm-text" id="perm-text"><strong>Enable birthday alerts</strong>Get notified when a member's birthday arrives.</div>
      <button class="perm-action" id="perm-btn" onclick="requestNotif()">Enable</button>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="nb on" onclick="sw('dash',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </button>
    <button class="nb" onclick="sw('mbrs',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Members
    </button>
    <button class="nb" onclick="sw('cal',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
    <button class="nb" onclick="sw('add',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Add Member
    </button>
    <button class="nb" onclick="sw('exec',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Exec Word
    </button>
  </div>

  <!-- Content -->
  <div class="body">

/* ── Helpers ── */
function parseDOB(s){if(!s)return null;const p=s.trim().split(' ');const d=parseInt(p[0]);const m=MO[p[1]];return(d&&m)?{day:d,month:m,name:p[1]}:null;}
function daysUntil(dob){if(!dob)return 999;const now=new Date();const td=new Date(now.getFullYear(),now.getMonth(),now.getDate());const bd=new Date(now.getFullYear(),dob.month-1,dob.day);let d=Math.round((bd-td)/86400000);if(d<0)d=Math.round((new Date(now.getFullYear()+1,dob.month-1,dob.day)-td)/86400000);return d;}
function isToday(dob){if(!dob)return false;const n=new Date();return dob.day===n.getDate()&&dob.month===n.getMonth()+1;}
function ini(f,l){return((f||'')[0]||'').toUpperCase()+((l||'')[0]||'').toUpperCase();}
function avc(i){return'av av'+(i%6);}
function getAll(){return[...SEED,...JSON.parse(localStorage.getItem('ipc_m')||'[]')];}
function getExtra(){return JSON.parse(localStorage.getItem('ipc_m')||'[]');}
function saveExtra(a){localStorage.setItem('ipc_m',JSON.stringify(a));}
function getMsgs(){return JSON.parse(localStorage.getItem('ipc_msgs')||JSON.stringify(DEF_MSGS));}
function saveMsgs(a){localStorage.setItem('ipc_msgs',JSON.stringify(a));}

function bdayMsg(m){
  const fn=m.first+' '+m.last;
  const aka=m.aka?' ('+m.aka+')':'';
  /* Pick a template: rotate daily so the same person gets a fresh message each day */
  const dayIndex=new Date().getDate()+new Date().getMonth()*31;
  const idx=(m.id+dayIndex)%MSG_TEMPLATES.length;
  return MSG_TEMPLATES[idx](fn,aka);
}
function copyMsg(id){const m=getAll().find(x=>x.id==id);if(!m)return;navigator.clipboard.writeText(bdayMsg(m)).then(()=>{const b=document.getElementById('cb-'+id);if(b){const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>{b.innerHTML=o;},2200);}}).catch(()=>alert(bdayMsg(m)));}
function delMbr(id){if(!confirm('Remove this member?'))return;saveExtra(getExtra().filter(m=>m.id!=id));init();}
function delMsg(id){if(!confirm('Remove this message?'))return;saveMsgs(getMsgs().filter(m=>m.id!=id));renderExec();}

/* ── Urgency logic ── */
function urgency(days,today){if(today)return'today';if(days<=3)return'week';if(days<=7)return'soon';return'blue';}
function mcClass(u){return{today:'mc-today',week:'mc-week',soon:'mc-soon',blue:'mc-def'}[u]||'mc-def';}
function cdnClass(u){return{today:'cdn-gold',week:'cdn-or',soon:'cdn-teal',blue:'cdn-blue'}[u]||'cdn-blue';}
function cdlClass(u){return{today:'cdl-gold',week:'cdl-or',soon:'cdl-teal',blue:'cdl-blue'}[u]||'cdl-blue';}
function dateBdgClass(u){return{today:'b-today',week:'b-week',soon:'b-near',blue:'b-date'}[u]||'b-date';}

/* ── Member card ── */
function mcard(m,idx,showCopy,showDel){
  const dob=typeof m.dob==='string'?parseDOB(m.dob):m.dob;
  const today=isToday(dob);const days=dob?daysUntil(dob):999;
  const u=urgency(days,today);
  const dayLabel=today?'🎂 Today!':days<=3?'In '+days+'d':days<=7?'In '+days+'d':'';
  return '<div class="mc '+mcClass(u)+'">'
    +'<div class="'+avc(idx)+'">'+ini(m.first,m.last)+'</div>'
    +'<div class="mi">'
    +'<div class="mn">'+m.first+' '+m.last+'</div>'
    +(m.aka?'<div class="ma">'+m.aka+'</div>':'')
    +(m.ph?'<div class="ph"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.37 2 2 0 0 1 3.58 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l1.97-1.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>'+m.ph+'</div>':'')
    +'<div class="mm">'
    +'<span class="bd b-loc">📍 '+(m.loc||'—')+'</span>'
    +(dob?'<span class="bd '+dateBdgClass(u)+'">🎂 '+dob.day+' '+dob.name+'</span>':'<span class="bd b-loc">No DOB</span>')
    +(dayLabel?'<span class="bd '+(today?'b-today':days<=3?'b-week':'b-near')+'">'+dayLabel+'</span>':'')
    +(m.state?'<span class="bd b-state">'+m.state+'</span>':'')
    +'</div></div>'
    +'<div class="mc-r">'
    +(dob&&!today?'<div class="cdown"><div class="cdn '+cdnClass(u)+'">'+days+'</div><div class="cdl '+cdlClass(u)+'">days</div></div>':'')
    +(showCopy&&dob?'<button class="ic-btn" id="cb-'+m.id+'" onclick="copyMsg('+m.id+')">📋 Msg</button>':'')
    +(showDel?'<button class="del-x" onclick="delMbr('+m.id+')" title="Remove">✕</button>':'')
    +'</div></div>';}

/* ── Dashboard ── */
function renderDash(){
  const all=getAll();const now=new Date();
  const wd=all.map((m,i)=>({...m,_i:i,dob:parseDOB(m.dob)})).filter(m=>m.dob);
  const todayB=wd.filter(m=>isToday(m.dob));
  const wdays=wd.map(m=>({...m,days:daysUntil(m.dob)}));
  const weekB=wdays.filter(m=>m.days>0&&m.days<=7).sort((a,b)=>a.days-b.days);
  const upB=wdays.filter(m=>m.days>0&&m.days<=30).sort((a,b)=>a.days-b.days);
  const mthB=wd.filter(m=>m.dob.month===now.getMonth()+1).length;
  let h='<div class="stats">'
    +'<div class="sc sc-g"><div class="sn">'+all.length+'</div><div class="sl">Total</div></div>'
    +'<div class="sc sc-gold"><div class="sn">'+todayB.length+'</div><div class="sl">Today</div></div>'
    +'<div class="sc sc-or"><div class="sn">'+weekB.length+'</div><div class="sl">This Week</div></div>'
    +'<div class="sc sc-teal"><div class="sn">'+mthB+'</div><div class="sl">This Month</div></div>'
    +'</div>';
  if(todayB.length){
    const names=todayB.map(m=>m.first+(m.aka?' ('+m.aka+')':'')).join(' & ');
    h+='<div class="banner bn-gold"><h3>🎂 Birthday Celebration Today!</h3><p>'+names+' — wishing you a joyful celebration from all of IPC! 🥂</p></div>';
    todayB.forEach((m,i)=>h+=mcard(m,m._i||i,true,false));}
  if(weekB.length){
    h+='<div class="sh"><span class="sh-label">This Week</span><span class="sh-chip chip-or">'+weekB.length+'</span></div>';
    weekB.forEach((m,i)=>h+=mcard(m,m._i||i,true,false));}
  if(upB.length){
    h+='<div class="sh"><span class="sh-label">Next 30 Days</span><span class="sh-chip chip-teal">'+upB.length+'</span></div>';
    upB.forEach((m,i)=>h+=mcard(m,m._i||i,true,false));}
  else if(!todayB.length&&!weekB.length)
    h+='<div class="banner bn-info"><p>📅 No birthdays in the next 30 days — check the Calendar for the full picture.</p></div>';
  document.getElementById('tab-dash').innerHTML=h;}

/* ── Members ── */
let _q='',_mf='',_ms='days';
function renderMembers(q,mf,ms){
  if(q!==undefined)_q=q;if(mf!==undefined)_mf=mf;if(ms!==undefined)_ms=ms;
  let all=getAll().map((m,i)=>({...m,_i:i,dob:parseDOB(m.dob)}));
  if(_q){const ql=_q.toLowerCase();all=all.filter(m=>(m.first+' '+m.last+' '+(m.aka||'')+' '+(m.loc||'')).toLowerCase().includes(ql));}
  if(_mf)all=all.filter(m=>m.dob&&m.dob.month===parseInt(_mf));
  all=all.map(m=>({...m,days:m.dob?daysUntil(m.dob):999}));
  if(_ms==='days')all.sort((a,b)=>a.days-b.days);
  else if(_ms==='name')all.sort((a,b)=>a.first.localeCompare(b.first));
  else all.sort((a,b)=>(a.loc||'').localeCompare(b.loc||''));
  let h='<div class="sw"><svg class="sw-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
    +'<input class="si" type="text" placeholder="Search name, nickname, location..." id="msrch" value="'+(encodeHtml(_q)||'')+'" oninput="renderMembers(this.value)"></div>'
    +'<div class="frow">'
    +'<select onchange="renderMembers(undefined,this.value)"><option value="">All months</option>'
    +MN.map((n,i)=>'<option value="'+(i+1)+'"'+(parseInt(_mf)===i+1?' selected':'')+'>'+n+'</option>').join('')
    +'</select>'
    +'<select onchange="renderMembers(undefined,undefined,this.value)">'
    +'<option value="days"'+(_ms==='days'?' selected':'')+'>Upcoming first</option>'
    +'<option value="name"'+(_ms==='name'?' selected':'')+'>Name A–Z</option>'
    +'<option value="loc"'+(_ms==='loc'?' selected':'')+'>By location</option>'
    +'</select></div>'
    +'<div class="res-count">'+all.length+' Member'+(all.length!==1?'s':'')+' Shown</div>';
  if(!all.length)h+='<div class="empty-state">No members found</div>';
  all.forEach((m,i)=>h+=mcard(m,m._i||i,true,!m.seed));
  document.getElementById('tab-mbrs').innerHTML=h;}

/* ── Calendar ── */
let _cm=new Date().getMonth()+1;
function renderCal(m){
  if(m!==undefined)_cm=parseInt(m);
  const now=new Date();const yr=now.getFullYear();
  const bdays=getAll().map((x,i)=>({...x,_i:i,dob:parseDOB(x.dob)})).filter(x=>x.dob&&x.dob.month===_cm);
  const byDay={};bdays.forEach(x=>{if(!byDay[x.dob.day])byDay[x.dob.day]=[];byDay[x.dob.day].push(x);});
  const first=new Date(yr,_cm-1,1).getDay();const dim=new Date(yr,_cm,0).getDate();
  let h='<div class="cal-nav"><select onchange="renderCal(this.value)">'
    +MN.map((n,i)=>'<option value="'+(i+1)+'"'+(i+1===_cm?' selected':'')+'>'+n+' '+yr+'</option>').join('')
    +'</select><span class="cal-cnt">'+bdays.length+' Birthday'+(bdays.length!==1?'s':'')+'</span></div>'
    +'<div class="cgrid">'+['S','M','T','W','T','F','S'].map(d=>'<div class="cdh">'+d+'</div>').join('');
  for(let i=0;i<first;i++)h+='<div class="cday emp"></div>';
  for(let d=1;d<=dim;d++){const tdy=d===now.getDate()&&_cm===now.getMonth()+1;const bs=byDay[d]||[];
    h+='<div class="cday'+(bs.length?' hbd':'')+(tdy?' tdy':'')+'"><span class="cnum">'+d+'</span>'+(bs.length?'<span class="cnames">'+bs.map(x=>x.first.split(' ')[0]).join(', ')+'</span>':'')+'</div>';}
  h+='</div>';
  if(bdays.length){
    h+='<div class="sh"><span class="sh-label">'+MN[_cm-1]+' Birthdays</span><span class="sh-chip chip-gold">'+bdays.length+'</span></div>';
    [...bdays].sort((a,b)=>a.dob.day-b.dob.day).forEach((m,i)=>h+=mcard(m,m._i||i,true,false));}
  else h+='<div class="empty-state">No birthdays in '+MN[_cm-1]+'</div>';
  document.getElementById('tab-cal').innerHTML=h;}

/* ── Add Member ── */
function renderAdd(){
  document.getElementById('tab-add').innerHTML=
    '<div class="sh" style="margin-top:0"><span class="sh-label">Register New Member</span></div>'
    +'<div class="fgrid">'
    +'<div class="fg"><label class="fl">First Name *</label><input type="text" id="nfn" placeholder="e.g. Chukwuemeka" autocomplete="given-name"></div>'
    +'<div class="fg"><label class="fl">Last Name *</label><input type="text" id="nln" placeholder="e.g. Okafor" autocomplete="family-name"></div>'
    +'<div class="fg"><label class="fl">Nickname / AKA</label><input type="text" id="naka" placeholder="e.g. Big K"></div>'
    +'<div class="fg"><label class="fl">Location / City</label><input type="text" id="nloc" placeholder="e.g. Dubai"></div>'
    +'<div class="fg"><label class="fl">Birth Day *</label><input type="number" id="nday" min="1" max="31" placeholder="1–31" inputmode="numeric"></div>'
    +'<div class="fg"><label class="fl">Birth Month *</label><select id="nmon"><option value="">Select month</option>'+MN.map(n=>'<option>'+n+'</option>').join('')+'</select></div>'
    +'<div class="fg full"><label class="fl">State of Origin</label><input type="text" id="nstate" placeholder="e.g. Imo State"></div>'
    +'<div class="fg full"><label class="fl">Phone / WhatsApp</label><input type="tel" id="nph" placeholder="+971 ..." autocomplete="tel"></div>'
    +'</div>'
    +'<button class="btn-go" onclick="doAdd()">➕ Add Member</button>'
    +'<div class="ok-msg" id="add-ok">✓ Member added successfully!</div>'
    +'<div class="err-msg" id="add-err"></div>';}

function doAdd(){
  const fn=document.getElementById('nfn').value.trim();const ln=document.getElementById('nln').value.trim();
  const day=document.getElementById('nday').value.trim();const mon=document.getElementById('nmon').value;
  const err=document.getElementById('add-err');err.style.display='none';
  if(!fn||!ln){err.textContent='Please enter first and last name.';err.style.display='block';return;}
  if((day&&!mon)||(!day&&mon)){err.textContent='Please provide both birth day and month, or leave both blank.';err.style.display='block';return;}
  if(day&&(parseInt(day)<1||parseInt(day)>31)){err.textContent='Birth day must be between 1 and 31.';err.style.display='block';return;}
  const ex=getExtra();
  ex.push({id:Date.now(),first:fn,last:ln,aka:document.getElementById('naka').value.trim(),
    loc:document.getElementById('nloc').value.trim(),dob:day&&mon?(String(day).padStart(2,'0')+' '+mon):'',
    state:document.getElementById('nstate').value.trim(),ph:document.getElementById('nph').value.trim(),seed:0});
  saveExtra(ex);['nfn','nln','naka','nloc','nday','nstate','nph'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('nmon').value='';
  document.getElementById('add-ok').style.display='block';
  setTimeout(()=>{document.getElementById('add-ok').style.display='none';},3000);
  document.getElementById('hdr-sub').textContent=getAll().length+' Members · Birthday Tracker';
  updateBell();}

/* ── Executive Word ── */
function renderExec(){
  const msgs=getMsgs();
  let h='<div class="sh" style="margin-top:0"><span class="sh-label">Leadership Messages</span><span class="sh-chip chip-gold">'+msgs.length+'</span></div>';
  if(!msgs.length)h+='<div class="empty-state">No messages posted yet</div>';
  msgs.forEach(m=>{h+='<div class="ec"><div class="ec-row"><div><div class="en">'+m.name+'</div><div class="et">'+m.title+'</div></div>'
    +'<button class="del-x" onclick="delMsg('+m.id+')" title="Remove">✕</button></div>'
    +'<div class="em">"'+m.msg+'"</div><div class="edt">'+m.date+'</div></div>';});
  h+='<div class="divider"></div>'
    +'<div class="sh"><span class="sh-label">Post a New Message</span></div>'
    +'<div class="fg" style="margin-bottom:10px"><label class="fl">Executive Name *</label><input type="text" id="ename" placeholder="e.g. Chibuike Okonkwo"></div>'
    +'<div class="fg" style="margin-bottom:10px"><label class="fl">Role / Title *</label><input type="text" id="etitle" placeholder="e.g. IPC Secretary General"></div>'
    +'<div class="fg"><label class="fl">Birthday Message *</label><textarea id="emsg" placeholder="Write your message to celebrating members..."></textarea></div>'
    +'<button class="btn-go" onclick="doMsg()">📨 Post Message</button>'
    +'<button class="btn-sm" onclick="if(confirm(\'Clear all messages?\')){saveMsgs([]);renderExec();}">🗑 Clear All Messages</button>'
    +'<div class="ok-msg" id="exec-ok">✓ Message posted!</div>';
  document.getElementById('tab-exec').innerHTML=h;}

function doMsg(){
  const n=document.getElementById('ename').value.trim();const t=document.getElementById('etitle').value.trim();const m=document.getElementById('emsg').value.trim();
  if(!n||!t||!m){alert('Please fill in all three fields.');return;}
  const msgs=getMsgs();
  msgs.unshift({id:Date.now(),name:n,title:t,msg:m,date:new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'})});
  saveMsgs(msgs);renderExec();
  setTimeout(()=>{const el=document.getElementById('exec-ok');if(el)el.style.display='block';},30);
  setTimeout(()=>{const el=document.getElementById('exec-ok');if(el)el.style.display='none';},3000);}

/* ── Bell & Notifications ── */
function updateBell(){
  const all=getAll().map(m=>({...m,dob:parseDOB(m.dob)})).filter(m=>m.dob);
  const week=all.filter(m=>{const d=daysUntil(m.dob);return d>=0&&d<=7;});
  const badge=document.getElementById('bell-badge');const lbl=document.getElementById('bell-lbl');
  if(week.length){badge.style.display='flex';badge.textContent=week.length;if(lbl)lbl.textContent=week.length;}
  else{badge.style.display='none';if(lbl)lbl.textContent='';}
  const sorted=all.map(m=>({...m,days:daysUntil(m.dob)})).sort((a,b)=>a.days-b.days).slice(0,12);
  const el=document.getElementById('notif-list');if(!el)return;
  el.innerHTML=sorted.length?sorted.map(m=>{const today=isToday(m.dob);const near=m.days<=7&&!today;
    return '<div class="ni"><span class="ni-dot '+(today?'d-gold':near?'d-green':'d-gray')+'"></span>'
    +'<span class="ni-name">'+m.first+' '+m.last+(m.aka?' · '+m.aka:'')+'</span>'
    +'<span class="ni-sub">'+(today?'Today!':m.days===1?'Tomorrow':'In '+m.days+'d')+'</span></div>';}).join('')
    :'<div style="font-size:14px;font-weight:600;color:#9ca3af;padding:.6rem 0">No upcoming birthdays found.</div>';}

function updatePermUI(){
  const btn=document.getElementById('perm-btn');const txt=document.getElementById('perm-text');if(!btn||!txt)return;
  if(!('Notification' in window)){btn.textContent='Not supported';btn.className='perm-action denied-state';txt.innerHTML='<strong>Unavailable</strong>Your browser does not support notifications.';return;}
  const p=Notification.permission;
  if(p==='granted'){btn.textContent='✓ On';btn.className='perm-action ok-state';txt.innerHTML='<strong>Notifications are on</strong>You\'ll be alerted for today\'s birthdays while this page is open.';}
  else if(p==='denied'){btn.textContent='Blocked';btn.className='perm-action denied-state';txt.innerHTML='<strong>Notifications blocked</strong>Please update your browser site settings.';}
  else{btn.textContent='Enable';btn.className='perm-action';txt.innerHTML='<strong>Enable birthday alerts</strong>Get notified when a member\'s birthday arrives.';}}

async function requestNotif(){
  if(!('Notification' in window)){alert('Your browser does not support notifications.');return;}
  if(Notification.permission==='denied'){alert('Notifications are blocked. Please update your browser settings.');return;}
  await Notification.requestPermission();updatePermUI();checkAndNotify();}

function checkAndNotify(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const key='ipc_n_'+new Date().toDateString();const sent=JSON.parse(localStorage.getItem(key)||'[]');let fired=false;
  getAll().forEach(m=>{const dob=parseDOB(m.dob);if(!dob||!isToday(dob)||sent.includes(m.id))return;
    try{new Notification('🎂 IPC Birthday Alert!',{body:'Today is '+m.first+' '+m.last+(m.aka?' ('+m.aka+')':'')+'\'s birthday! Send your wishes!',tag:'bday_'+m.id});}catch(e){}
    sent.push(m.id);fired=true;});
  if(fired)localStorage.setItem(key,JSON.stringify(sent));}

function togglePanel(){const p=document.getElementById('notif-panel');p.classList.toggle('open');if(p.classList.contains('open'))updatePermUI();}
function sw(tab,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('tab-'+tab).classList.add('on');btn.classList.add('on');}
function encodeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Init ── */
function init(){
  const now=new Date();
  document.getElementById('hdr-date').textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('hdr-sub').textContent=getAll().length+' Members · Birthday Tracker';
  renderDash();renderMembers();renderCal();renderAdd();renderExec();updateBell();
  if('Notification' in window&&Notification.permission==='granted')checkAndNotify();
  setInterval(checkAndNotify,3600000);}
init();
</script>
</body>
